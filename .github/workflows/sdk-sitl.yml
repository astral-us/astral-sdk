name: sdk-sitl

# Public per-frame regression gate: exercises astral_sdk against real ArduPilot SITL
# (Copter/Rover/Plane) with no hardware. See tests/test_e2e_sitl.py and
# examples/sitl/README.md. Building ArduPilot from source is the slow part here (tens of
# minutes on a cold cache) — this is the honest cost of testing against real firmware
# rather than a mock; the cache below keeps warm-cache runs fast.
on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .[dev]
      - run: pytest tests/test_imports.py -v

  sitl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: sdk
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache ArduPilot checkout + build
        id: cache-ardupilot
        uses: actions/cache@v4
        with:
          path: ardupilot
          key: ardupilot-sitl-${{ runner.os }}-v1

      - name: Checkout ArduPilot
        if: steps.cache-ardupilot.outputs.cache-hit != 'true'
        run: git clone --recurse-submodules --depth 1 https://github.com/ArduPilot/ardupilot.git

      - name: Install ArduPilot SITL prerequisites
        run: |
          cd ardupilot
          Tools/environment_install/install-prereqs-ubuntu.sh -y

      - name: Build SITL for Copter, Rover, Plane
        run: |
          cd ardupilot
          . ~/.profile
          python3 -m pip install pexpect
          ./waf configure --board sitl
          ./waf copter rover plane

      - name: Install SDK
        run: pip install -e .
        working-directory: sdk

      - name: Run SITL e2e tests
        run: |
          . ~/.profile
          export PATH="$PWD/ardupilot/Tools/autotest:$PATH"
          cd sdk
          pytest tests/test_e2e_sitl.py -v
